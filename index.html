<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아라 - 링크 모음</title>
    <style>
        /* 1. 전체 배경 및 기본 폰트 설정 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            background-color: #f4f4f9; /* 배경색 */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px; /* 위아래 여백 */
            margin: 0;
        }

        /* 2. 프로필 영역 스타일 */
        .profile {
            text-align: center;
            margin-bottom: 40px;
        }

        .profile h1 {
            font-size: 24px;
            color: #333;
            margin: 0 0 10px 0;
        }

        .profile p {
            font-size: 16px;
            color: #666;
            margin: 0;
        }

        /* 3. 링크 버튼들을 묶는 컨테이너 */
        .links-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 350px; /* 버튼의 최대 너비 */
            gap: 15px; /* 버튼 사이의 간격 */
        }

        /* 4. 개별 링크 버튼 스타일 */
        .link-button {
            display: block;
            padding: 18px 20px;
            background-color: #ffffff;
            color: #333;
            text-decoration: none; /* 밑줄 제거 */
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px; /* 버튼 모서리 둥글게 */
            border: 1px solid #eaeaea;
            transition: all 0.2s ease; /* 부드러운 애니메이션 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.02); /* 살짝 그림자 */
            cursor: pointer; /* 복사 버튼에 마우스를 올렸을 때 클릭 모양으로 변경 */
        }

        /* 5. 마우스를 올렸을 때(호버) 효과 */
        .link-button:hover {
            background-color: #333333; /* 검은색으로 변경 */
            color: #ffffff; /* 글씨는 흰색으로 */
            transform: translateY(-2px); /* 살짝 위로 떠오르는 효과 */
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* 6. 복사 버튼 스타일 */
        .copy-button {
            border-color: #03C75A;
            color: #03C75A;
        }
        
        .copy-button:hover {
            background-color: #03C75A;
            color: #ffffff;
            border-color: #03C75A;
        }

    </style>
</head>
<body>

    <!-- 프로필 영역 -->
    <div class="profile">
        <h1>아라</h1>
        <p>안녕하세요. 네이버 인플루언서 아라입니다<br>메일로 연락주시면 가장 빠릅니다.</p>
    </div>

    <!-- 링크 버튼 영역 -->
    <div class="links-container">
        <!-- 1. 기본 메일 앱 연동 -->
        <a href="mailto:s87boyo@naver.com?subject=[IT테크 제휴 문의]" class="link-button">✉️ 제휴 메일 보내기 (기본 앱)</a>
        
        <!-- 2. 이메일 주소 복사 버튼 -->
        <div onclick="copyEmail(event)" class="link-button copy-button">📋 이메일 주소 복사하기</div>
        
        <!-- 3. 카카오톡 오픈채팅방 -->
        <a href="https://open.kakao.com/o/sdt3LIri" class="link-button" target="_blank">💬 카카오톡 오픈채팅방</a>
    </div>

    <!-- 이메일 주소 복사 기능을 위한 자바스크립트 -->
    <script>
        function copyEmail(event) {
            // 복사할 이메일 주소
            var email = "s87boyo@naver.com";
            
            // 임시 텍스트 영역을 만들어 복사 기능 실행
            var tempInput = document.createElement("textarea");
            tempInput.value = email;
            document.body.appendChild(tempInput);
            tempInput.select();
            
            try {
                document.execCommand("copy"); // 복사 실행
                
                // 클릭한 버튼의 시각적 피드백
                var btn = event.currentTarget;
                var originalText = btn.innerHTML;
                
                btn.innerHTML = "✅ 복사 완료! (s87boyo@naver.com)";
                btn.style.backgroundColor = "#03C75A";
                btn.style.color = "#ffffff";
                
                // 2초 후 원래 텍스트로 복구
                setTimeout(function() {
                    btn.innerHTML = originalText;
                    btn.style.backgroundColor = ""; // 인라인 스타일 제거 (CSS 호버 효과 복구)
                    btn.style.color = "";
                }, 2000);
                
            } catch (err) {
                console.error("복사 실패", err);
                alert("복사에 실패했습니다. 수동으로 복사해주세요: " + email);
            }
            
            document.body.removeChild(tempInput); // 임시 텍스트 영역 제거
        }
    </script>
</body>
</html>
