<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아라 - 링크 모음</title>
    <style>
        /* 1. 전체 배경 및 기본 폰트 설정 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            background-color: #f4f4f9; /* 배경색 */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px; /* 위아래 여백 */
            margin: 0;
        }

        /* 2. 프로필 영역 스타일 */
        .profile {
            text-align: center;
            margin-bottom: 40px;
        }

        .profile h1 {
            font-size: 24px;
            color: #333;
            margin: 0 0 10px 0;
        }

        .profile p {
            font-size: 16px;
            color: #666;
            margin: 0;
        }

        /* 3. 링크 버튼들을 묶는 컨테이너 */
        .links-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 350px; /* 버튼의 최대 너비 */
            gap: 15px; /* 버튼 사이의 간격 */
        }

        /* 4. 개별 링크 버튼 스타일 */
        .link-button {
            display: block;
            padding: 18px 20px;
            background-color: #ffffff;
            color: #333;
            text-decoration: none; /* 밑줄 제거 */
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px; /* 버튼 모서리 둥글게 */
            border: 1px solid #eaeaea;
            transition: all 0.2s ease; /* 부드러운 애니메이션 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.02); /* 살짝 그림자 */
        }

        /* 5. 마우스를 올렸을 때(호버) 효과 */
        .link-button:hover {
            background-color: #333333; /* 검은색으로 변경 */
            color: #ffffff; /* 글씨는 흰색으로 */
            transform: translateY(-2px); /* 살짝 위로 떠오르는 효과 */
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* 6. 네이버 메일 전용 버튼 (선택 사항: 네이버 색상 포인트) */
        .naver-button {
            border-color: #03C75A; /* 네이버 초록색 테두리 */
            color: #03C75A; /* 글씨도 초록색으로 하여 구분감을 줌 */
        }
        
        .naver-button:hover {
            background-color: #03C75A; /* 호버 시 초록색 배경 */
            color: #ffffff;
            border-color: #03C75A;
        }

    </style>
</head>
<body>

    <!-- 프로필 영역 -->
    <div class="profile">
        <h1>아라</h1>
        <p>안녕하세요. 네이버 인플루언서 아라입니다</p>
    </div>

    <!-- 링크 버튼 영역 -->
    <div class="links-container">
        <!-- 1. 기본 메일 앱 (기존 방식 유지) -->
        <a href="mailto:s87boyo@naver.com?subject=[IT테크 제휴 문의]" class="link-button">✉️ 제휴 메일 보내기 (기본 앱)</a>
        
        <!-- 2. 네이버 메일 쓰기 페이지로 바로 이동 (새로 추가) -->
        <!-- 구분하기 쉽도록 네이버 포인트 색상(초록색) 스타일(.naver-button)을 적용했습니다 -->
        <a href="https://mail.naver.com/write/popup?to=s87boyo@naver.com&subject=[IT테크 제휴 문의]" class="link-button naver-button" target="_blank">🟢 네이버 메일로 보내기 (웹)</a>
        
        <!-- 3. 카카오톡 오픈채팅방 -->
        <a href="https://open.kakao.com/o/sdt3LIri" class="link-button" target="_blank">💬 카카오톡 오픈채팅방</a>
    </div>

</body>
</html>
